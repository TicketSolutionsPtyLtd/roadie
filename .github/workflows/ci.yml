name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: --max-old-space-size=4096
  TURBO_FORCE: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch base branch
        run: git fetch origin main:refs/remotes/origin/main --depth=1

      - name: Setup
        uses: ./.github/composite-actions/setup

      - name: Lint, typecheck, and test
        run: pnpm turbo lint typecheck test --affected --framework-inference=false
        env:
          TURBO_SCM_BASE: origin/main

  build:
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch base branch
        run: git fetch origin main:refs/remotes/origin/main --depth=1

      - name: Setup
        uses: ./.github/composite-actions/setup

      - name: Build packages
        run: pnpm turbo build --affected --framework-inference=false
        env:
          NEXT_PUBLIC_BASE_PATH: /roadie
          TURBO_SCM_BASE: origin/main

      - name: Check bundle size
        run: pnpm --filter @oztix/roadie-components size:check
